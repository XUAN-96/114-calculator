<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>114年韌性家園計算器 (雲端同步版)</title>
<style>
/* ─── 樣式設定 (Style) ─── */
:root { --primary: #1a5276; --primary-light: #2e86c1; --primary-bg: #eaf4fd; --success: #27ae60; --success-bg: #d5f5e3; --warn: #f39c12; --warn-bg: #fdebd0; --danger: #c0392b; --text: #2c3e50; --bg: #f4f7f6; --cloud: #8e44ad; --cloud-bg: #f4ecf7; --shadow: 0 4px 12px rgba(0,0,0,0.08); }
*{box-sizing:border-box;margin:0;padding:0;outline:none;}
body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;}
button{font-family:inherit;cursor:pointer;}
.hd{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;box-shadow:0 2px 10px rgba(0,0,0,.15);}
.hd h1{font-size:1.1rem;font-weight:700;} .hd-badge{background:var(--warn);color:#fff;font-size:.75rem;font-weight:bold;padding:4px 12px;border-radius:20px;}
.step-bar{background:#fff;display:flex;box-shadow:0 2px 5px rgba(0,0,0,.05);position:sticky;top:58px;z-index:290;}
.stab{flex:1;padding:12px;text-align:center;font-size:.85rem;font-weight:600;color:#95a5a6;cursor:pointer;border-bottom:3px solid transparent;display:flex;align-items:center;justify-content:center;gap:8px;}
.stab.active{color:var(--primary);border-bottom-color:var(--primary);background:#f8fbff;}
.page{padding:20px 15px 120px;max-width:1000px;margin:0 auto;animation:fadeIn .4s ease;} @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.card{background:#fff;border-radius:12px;box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;} .card-hd{background:#f8f9fa;color:var(--primary);padding:14px 20px;font-weight:700;border-bottom:1px solid #eee; display: flex; justify-content: space-between; align-items: center;} .card-bd{padding:20px;}
.prog-box{background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:16px 20px;margin-bottom:20px;cursor:pointer;border-left:5px solid var(--success);} .prog-top{display:flex;justify-content:space-between;font-weight:700;color:var(--primary);margin-bottom:10px;} .prog-bg{background:#eee;border-radius:10px;height:10px;overflow:hidden;} .prog-fill{background:linear-gradient(90deg,var(--success),#58d68d);height:100%;border-radius:10px;transition:width .6s ease-out;}
.search-wrap{position:relative;margin-bottom:15px;} .search-inp{width:100%;padding:12px 15px 12px 40px;border:2px solid #eef2f5;border-radius:10px;} .search-icon{position:absolute;left:12px;top:12px;color:#aaa;}
.town-label{grid-column:1/-1;font-weight:700;color:var(--primary);margin-top:10px;border-bottom:2px solid #eef2f5;} .loc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.loc-btn{display:flex;flex-direction:column;align-items:center;text-align:center;padding:14px 10px;border:2px solid #eef2f5;border-radius:12px;cursor:pointer;background:#fff;min-height:90px;position:relative;} .loc-btn:hover{border-color:var(--primary-light);background:var(--primary-bg);} 
.loc-village{font-size:1rem;font-weight:700;color:var(--primary);} .loc-site{font-size:.65rem;color:#888;} 
.loc-ptag{font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:4px;} .ptag-p1{background:var(--primary-bg);color:var(--primary);} .ptag-p2{background:var(--success-bg);color:#1e8449;} 
.loc-btn.active{border-color:var(--primary);background:var(--primary);} .loc-btn.active *{color:#fff!important;}
.loc-btn.cloud-done { border-color: var(--cloud); background: var(--cloud-bg); }
.loc-btn.cloud-done::after { content:'☁ 已上傳'; position:absolute; top:5px; right:5px; font-size:.6rem; background:var(--cloud); color:#fff; padding:2px 6px; border-radius:10px; }
.loc-btn.local-done { border-color: var(--success); background: var(--success-bg); }

.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;} .proj-btn{padding:20px;border:2px solid #eee;border-radius:12px;cursor:pointer;background:#fcfcfc;text-align:center;} .proj-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);} .proj-icon{font-size:2.5rem;display:block;} .proj-warn-box{background:var(--warn-bg);border-left:4px solid var(--warn);padding:12px;color:#9a7d0a;margin-top:15px;display:none;}
.tbl-wrap{overflow-x:auto;} table{width:100%;border-collapse:collapse;min-width:500px;} th{background:#f4f6f8;color:var(--primary);padding:12px;text-align:center;} td{padding:10px 12px;border-bottom:1px solid #f0f2f5;} 

/* 分類標題置中 */
.cat-row td{background:var(--primary-bg);font-weight:700;color:var(--primary); text-align:center;} 

.price-col,.total-col{text-align:right;font-weight:700;}
.qty-ctrl{display:flex;justify-content:center;gap:5px;} .qty-btn{width:28px;height:28px;border:1px solid #ddd;background:#fff;border-radius:4px;} .qty-input{width:60px;text-align:center;border:1px solid #ddd;border-radius:4px;}

/* 自訂項目樣式 */
.custom-row { background: #fffcf5; }
.custom-input { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
.custom-price-input { width: 80px; text-align: right; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
.add-custom-btn-row td { padding: 15px; text-align: center; border-bottom: none; }

.budget-banner{background:#fff;border-top:1px solid #ddd;box-shadow:0 -4px 20px rgba(0,0,0,.15);position:fixed;bottom:0;left:0;width:100%;z-index:400;padding:15px 20px;display:none;justify-content:space-between;align-items:center;} .bb-bar-area{flex:1;margin:0 20px;} .bb-bar-bg{height:8px;background:#eee;border-radius:4px;} .bb-bar-fill{height:100%;background:var(--primary-light);}
.nav-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;} .btn{flex:1;padding:14px;border:none;border-radius:8px;font-weight:700;color:#fff;min-width:140px;} .btn-primary{background:var(--primary);} .btn-outline{background:#fff;border:2px solid var(--primary);color:var(--primary);} .btn-danger{background:var(--danger);} .btn-warn{background:var(--warn);} .btn-drive{background:linear-gradient(135deg, #8e44ad, #9b59b6);} .btn-success{background:var(--success);}
.btn-sm { padding: 4px 10px; font-size: 0.8rem; border-radius: 4px; border: 1px solid; min-width: auto; margin-right: 3px;}
.btn-sm.btn-outline { border-color: var(--primary); background: #fff; color: var(--primary); }
.btn-sm.btn-edit { border-color: #27ae60; background: #fff; color: #27ae60; }
.btn-sm.btn-danger { border-color: var(--danger); background: #fff; color: var(--danger); }
.result-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px;} .meta-box{background:#f8fbff;border:1px solid #d6eaf8;padding:12px;border-radius:8px;} .meta-lbl{font-size:.75rem;color:#888;} .meta-val{font-size:1.1rem;font-weight:700;color:var(--primary);}
.sum-box{background:linear-gradient(135deg,#2c3e50,#34495e);color:#fff;padding:25px;border-radius:12px;margin-bottom:20px;}
.sum-row { display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid rgba(255,255,255,.3); padding-bottom:10px; margin-bottom:10px; }
.sum-info-row { display:flex; justify-content:space-between; font-size:.9rem; opacity:.9; margin-bottom: 4px; }
.toast{position:fixed;top:80px;right:20px;background:var(--primary);color:#fff;padding:12px 24px;border-radius:50px;display:none;z-index:1000;}
.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.8);z-index:2000;display:none;align-items:center;justify-content:center;flex-direction:column;}
.spinner{width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid var(--primary);border-radius:50%;animation:spin 1s linear infinite;} @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.hidden{display:none;}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:999;display:none;align-items:flex-start;justify-content:center;padding-top:80px;}
.modal-box{background:#fff;width:90%;max-width:700px;border-radius:12px;padding:25px;max-height:80vh;overflow-y:auto;}
.modal-hd{display:flex;justify-content:space-between;margin-bottom:15px;align-items:center;}
.cloud-status-bar { background:#f4ecf7; color:#8e44ad; padding:8px 15px; font-size:0.85rem; font-weight:bold; border-bottom:1px solid #e1bee7; display:flex; align-items:center; justify-content:space-between; }
@media print { body{background:#fff;} .hd,.step-bar,.budget-banner,.nav-row,.search-wrap,.prog-box,.toast,.act-area,.loading-overlay,.cloud-status-bar{display:none!important;} .page{padding:0;} .card{box-shadow:none;border:1px solid #000;} #page0,#page1{display:none!important;} #page2{display:block!important;} }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p style="margin-top:15px;font-weight:bold;color:#1a5276" id="loadingText">處理中...</p>
</div>

<div class="hd">
  <h1>📋 114年韌性家園計算器</h1>
  <span class="hd-badge" id="hdBadge">STEP 1 / 3</span>
</div>

<div class="cloud-status-bar">
  <span id="cloudStatusText">☁ 正在同步雲端資料...</span>
  <button style="background:#8e44ad;color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:0.75rem;" onclick="syncCloud()">↻ 重新整理</button>
</div>

<div class="step-bar">
  <div class="stab active" id="stab0" onclick="goPage(0)"><span class="snum">1</span>地點與工項</div>
  <div class="stab"        id="stab1" onclick="goPage(1)"><span class="snum">2</span>數量明細</div>
  <div class="stab"        id="stab2" onclick="goPage(2)"><span class="snum">3</span>報表預覽</div>
</div>

<!-- PAGE 1 -->
<div class="page" id="page0">
  <div class="prog-box" onclick="showSavedModal()">
    <div class="prog-top"><span>&#128193; 本機暫存 (點擊管理)</span><span id="progText">0 / 23</span></div>
    <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <div class="card">
    <div class="card-hd">&#128205; 選擇村里地點</div>
    <div class="card-bd">
      <div class="search-wrap"><span class="search-icon">&#128269;</span><input type="text" class="search-inp" id="locSearch" placeholder="搜尋村里..." onkeyup="filterLocs()"></div>
      <div class="loc-grid" id="locContainer"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-hd">&#128736; 選擇工項</div>
    <div class="card-bd">
      <div class="proj-grid">
        <div class="proj-btn" id="pbtn1" onclick="selectProject(1)"><span class="proj-icon">&#9728;</span><span style="font-weight:bold">01 防災避難所</span><br><small>預算上限 $130,000</small></div>
        <div class="proj-btn" id="pbtn2" onclick="selectProject(2)"><span class="proj-icon">&#9850;</span><span style="font-weight:bold">02 低碳永續家園</span><br><small>預算上限 $200,000</small></div>
      </div>
      <div class="proj-warn-box" id="projWarn"></div>

      <div style="margin-top:15px;">
        <button class="btn btn-drive" style="width:100%" onclick="uploadAllToDrive()">☁ 將所有資料上傳到雲端</button>
        <div style="margin-top:8px;font-size:0.8rem;color:#888;line-height:1.4;">
          會將「本機暫存」內所有已儲存的村里報價單，逐筆上傳到雲端資料夾。(同名檔案會被覆蓋)
        </div>
      </div>
    </div>
  </div>

  <div class="nav-row">
    <button class="btn btn-primary" id="nextBtn1" onclick="goPage(1)" disabled>下一步 &#8594;</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page hidden" id="page1">
  <div class="card">
    <div class="card-hd">
      <span>&#9997; 數量輸入</span>
      <div style="display:flex; align-items:center; gap:10px;">
        <small style="font-weight:normal" id="p2-loc-info"></small>
      </div>
    </div>
    <div class="card-bd">
      <div class="tbl-wrap">
        <table>
          <!-- 移除勾選欄位 -->
          <thead><tr><th>項目</th><th style="width:90px">單價</th><th style="width:110px">數量</th><th style="width:90px">小計</th></tr></thead>
          <tbody id="inputBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div style="height:60px"></div>
  <div class="nav-row">
    <button class="btn btn-outline" onclick="goPage(0)">&#8592; 上一步</button>
    <button class="btn btn-primary" onclick="goPage(2)">下一步 &#8594;</button>
  </div>
</div>

<div class="budget-banner" id="budgetBanner">
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="font-size:1.5rem">💰</div>
    <div><div style="font-size:.75rem;color:#888" id="bbLabel">還差</div><div style="font-weight:900;font-size:1.2rem;line-height:1" id="bbDiff">$0</div></div>
  </div>
  <div class="bb-bar-area"><div class="bb-bar-bg"><div class="bb-bar-fill" id="bbFill" style="width:0%"></div></div></div>
  <div style="font-weight:900;color:var(--primary)" id="bbPct">0%</div>
</div>

<!-- PAGE 3 -->
<div class="page hidden" id="page2">
  <div class="card">
    <div class="card-hd">&#128196; 報價單預覽</div>
    <div class="card-bd">
      <div class="result-meta">
        <div class="meta-box"><div class="meta-lbl">地點</div><div class="meta-val" id="rLoc">-</div></div>
        <div class="meta-box"><div class="meta-lbl">工項</div><div class="meta-val" id="rProj">-</div></div>
        <div class="meta-box"><div class="meta-lbl">日期</div><div class="meta-val" id="rDate">-</div></div>
      </div>
      <div class="tbl-wrap">
        <table><thead><tr><th>規格</th><th>單價</th><th>數量</th><th>小計</th></tr></thead><tbody id="resultBody"></tbody></table>
      </div>
    </div>
  </div>
  <div class="act-area">
    <div class="sum-box">
      <div class="sum-row"><span>總金額</span><span class="sum-val" id="rTotal">$0</span></div>
      <div class="sum-info-row"><span>預算上限</span><span id="rLimitInfo">$0</span></div>
      <div class="sum-info-row" id="rDiffRow" style="font-weight:bold;font-size:1.1rem;margin-top:5px;padding-top:5px;border-top:1px solid rgba(255,255,255,0.2)">
        <span id="rDiffLabel">結餘</span><span id="rDiffVal">$0</span>
      </div>
    </div>

    <div class="nav-row">
      <button class="btn btn-outline" onclick="goPage(1)">&#8592; 修改</button>
      <button class="btn btn-warn" onclick="window.print()">&#128438; 列印/PDF</button>
      <button class="btn btn-primary" onclick="exportCSV()">&#128202; 下載 CSV</button>
      <button class="btn btn-success" style="flex-basis:100%" onclick="markDone()">&#10003; 儲存並完成</button>
    </div>
    <div style="margin-top:20px;text-align:center;"><button style="background:none;border:none;color:#aaa;text-decoration:underline" onclick="resetAll()">重置本機資料</button></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="savedModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-hd">
      <h3 id="modalTitle">本機暫存清單</h3>
      <button style="border:none;background:none;font-size:1.5rem" onclick="closeModal()">×</button>
    </div>
    <div id="savedListView"><div class="tbl-wrap"><table><thead><tr><th>村里</th><th>金額</th><th>操作</th></tr></thead><tbody id="modalListBody"></tbody></table></div></div>
    <div id="savedDetailView" class="hidden">
      <button class="btn-sm btn-outline" onclick="showSavedModal()">&#8592; 返回清單</button>
      <div style="margin-top:10px;font-weight:bold;font-size:1.1rem;color:var(--primary)" id="detailTitle"></div>
      <div class="tbl-wrap" style="margin-top:10px"><table><thead><tr><th>規格</th><th>單價</th><th>數量</th><th>小計</th></tr></thead><tbody id="detailTableBody"></tbody></table></div>
      <div style="text-align:right;margin-top:10px;font-weight:bold" id="detailTotal"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ★★★ 請替換成你最新部署的「網頁應用程式」網址 ★★★

/* CONFIG & DATA */

function fmtMoney(n){return '$'+Number(n).toLocaleString();}
function toast(m){let t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>{t.style.display='none'},3000);}

function syncCloud(){
  let st = document.getElementById('cloudStatusText');
  st.textContent = "☁ 正在讀取雲端資料...";
  st.style.color = "#888";

  fetch(GOOGLE_SCRIPT_URL, { method:'GET', redirect:'follow', cache:'no-store' })
    .then(res => res.text())
    .then(txt => {
      if((txt || '').trim().startsWith('<')){
        st.textContent = "⚠ 同步失敗：請檢查 GAS 部署是否設為「所有人可存取」";
        st.style.color = "red";
        return;
      }
      let files = [];
      try { files = JSON.parse(txt || '[]'); } catch(e){ files = []; }
      if(!Array.isArray(files)) files = [];
      
      state.cloudFiles = files;
      updateCloudStatusUI();
      st.textContent = "✔ 雲端已同步";
      st.style.color = "#8e44ad";
    })
    .catch(err => {
      console.error(err);
      st.textContent = "⚠ 雲端同步失敗 (CORS或網路錯誤)";
      st.style.color = "red";
    });
}

function updateCloudStatusUI(){
  CONFIG.locs.forEach(loc => {
    let btn = document.getElementById(`loc_${loc.id}`);
    if(!btn) return;
    let searchName = `${loc.t}_${loc.v}`;
    let isUploaded = (state.cloudFiles || []).some(f => String(f).includes(searchName));
    if(isUploaded){ btn.classList.add('cloud-done'); }
    else { btn.classList.remove('cloud-done'); }
  });
}

function goPage(n){
  if(n>0&&(!state.loc||!state.proj)){toast('請先選擇地點');return;}
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('hidden',i!==n));
  document.querySelectorAll('.stab').forEach((s,i)=>s.className=`stab ${i===n?'active':(i<n?'done':'')}`);
  document.getElementById('hdBadge').textContent=`STEP ${n+1} / 3`;
  document.getElementById('budgetBanner').style.display=(n===1)?'flex':'none';
  if(n===1)updateBudget();
  if(n===2)renderResult();
  window.scrollTo(0,0);
}

function renderLocs(){
  let c=document.getElementById('locContainer');c.innerHTML='';let lastTown='';
  CONFIG.locs.forEach(l=>{
    if(l.t!==lastTown){let dv=document.createElement('div');dv.className='town-label';dv.textContent=`📍 ${l.t}`;c.appendChild(dv);lastTown=l.t;}
    let b=document.createElement('div');b.className=`loc-btn ${state.saved[l.id]?'local-done':''}`;b.id=`loc_${l.id}`;
    b.onclick=()=>selectLoc(l);
    b.innerHTML=`<div class="loc-village">${l.v}</div><div class="loc-site">${l.s}</div><span class="loc-ptag ${l.p===1?'ptag-p1':'ptag-p2'}">${l.p===1?'防災':'低碳'}</span>`;
    c.appendChild(b);
  });
  updateCloudStatusUI();
}

function filterLocs(){
  let k=document.getElementById('locSearch').value.toLowerCase();
  document.querySelectorAll('.loc-btn').forEach(b=>{b.style.display=b.textContent.toLowerCase().includes(k)?'flex':'none';});
}

function selectLoc(l){
  state.loc=l;
  document.querySelectorAll('.loc-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`loc_${l.id}`).classList.add('active');

  if(state.saved[l.id]){
    let s=state.saved[l.id];
    state.proj=s.proj;
    state.qty=JSON.parse(JSON.stringify(s.qty));
    state.chk=JSON.parse(JSON.stringify(s.chk)); // Keep for legacy state
    state.custom=s.custom ? JSON.parse(JSON.stringify(s.custom)) : [];
    toast(`已載入本機資料：${l.v}`);
  }else{
    state.proj=l.p;
    state.qty={};
    state.chk={};
    state.custom=[];
  }
  updateProjUI();
}

function selectProject(p){
  if(!state.loc)return;
  if(state.loc.p!==p && !confirm('建議工項不同，確定切換？'))return;
  state.proj=p;state.qty={};state.chk={};state.custom=[];updateProjUI();
}

function updateProjUI(){
  document.getElementById('pbtn1').className=`proj-btn ${state.proj===1?'active':''}`;
  document.getElementById('pbtn2').className=`proj-btn ${state.proj===2?'active':''}`;
  let wb=document.getElementById('projWarn');
  wb.style.display=(state.loc.p!==state.proj)?'block':'none';
  if(state.loc.p!==state.proj) wb.innerHTML='⚠️ 注意：您選擇了非建議工項。';
  document.getElementById('nextBtn1').disabled=false;
  renderInputTable();
}

function renderInputTable(){
  let tb=document.getElementById('inputBody');tb.innerHTML='';
  document.getElementById('p2-loc-info').textContent=`${state.loc.t} ${state.loc.v}`;
  let list=CONFIG.items[state.proj],lastCat='';
  
  // ─── 渲染內建項目 (不含勾選欄位) ───
  list.forEach((it,i)=>{
    if(it.c!==lastCat){let r=tb.insertRow();r.className='cat-row';r.innerHTML=`<td colspan="4">${it.c}</td>`;lastCat=it.c;}
    let r=tb.insertRow(),q=state.qty[i]||0;
    
    // 自動將舊的 chk 狀態設為 true 如果數量 > 0 (兼容舊資料)
    state.chk[i] = q > 0;

    r.innerHTML=`
    <td>${it.n}</td><td class="price-col">${fmtMoney(it.p)}</td>
    <td><div class="qty-ctrl"><button class="qty-btn" onclick="stepQty(${i},-1)">-</button>
    <input type="number" class="qty-input" id="qinp_${i}" value="${q}" onchange="inputQty(${i},this.value)">
    <button class="qty-btn" onclick="stepQty(${i},1)">+</button></div></td>
    <td class="total-col" id="sub_${i}">${fmtMoney(q*it.p)}</td>`;
  });

  // ─── 渲染自訂項目 ───
  if(state.custom.length > 0){
    let cr=tb.insertRow();cr.className='cat-row';cr.innerHTML=`<td colspan="4">自訂項目</td>`;
    state.custom.forEach((cItem, i) => {
      let r = tb.insertRow();
      r.className = 'custom-row';
      r.innerHTML = `
        <td style="display:flex; align-items:center; gap:8px;">
          <button class="btn-sm btn-danger" style="margin:0;" onclick="removeCustomRow(${i})" title="刪除">✖</button>
          <input type="text" class="custom-input" placeholder="輸入項目名稱" value="${cItem.n}" onchange="updateCustomName(${i}, this.value)">
        </td>
        <td class="price-col"><input type="number" class="custom-price-input" placeholder="單價" value="${cItem.p}" onchange="updateCustomPrice(${i}, this.value)"></td>
        <td>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="stepCustomQty(${i},-1)">-</button>
            <input type="number" class="qty-input" id="cqinp_${i}" value="${cItem.q}" onchange="inputCustomQty(${i},this.value)">
            <button class="qty-btn" onclick="stepCustomQty(${i},1)">+</button>
          </div>
        </td>
        <td class="total-col" id="csub_${i}">${fmtMoney(cItem.q * cItem.p)}</td>
      `;
    });
  }
  
  // ─── 新增自訂項目按鈕 (放置於最底下一列) ───
  let addRow = tb.insertRow();
  addRow.className = 'add-custom-btn-row';
  addRow.innerHTML = `<td colspan="4"><button class="btn-sm btn-outline" style="font-weight:bold; padding: 8px 16px; font-size: 0.9rem;" onclick="addCustomRow()">+ 新增自訂項目</button></td>`;

  updateBudget();
}

function stepQty(i,d){
    let v=Math.max(0,(state.qty[i]||0)+d);
    state.qty[i]=v;
    state.chk[i] = v > 0; // 同步狀態
    document.getElementById(`qinp_${i}`).value=v;
    updateSub(i);
}
function inputQty(i,v){
    let n=parseInt(v);
    if(isNaN(n)||n<0)n=0;
    state.qty[i]=n;
    state.chk[i] = n > 0; // 同步狀態
    document.getElementById(`qinp_${i}`).value=n;
    updateSub(i);
}
function updateSub(i){document.getElementById(`sub_${i}`).textContent=fmtMoney((state.qty[i]||0)*CONFIG.items[state.proj][i].p);updateBudget();}

// ─── 自訂項目功能函數 ───
function addCustomRow() {
  state.custom.push({n: '', p: 0, q: 1});
  renderInputTable();
}
function removeCustomRow(i) {
  state.custom.splice(i, 1);
  renderInputTable();
}
function updateCustomName(i, val) {
  state.custom[i].n = val;
}
function updateCustomPrice(i, val) {
  let p = parseInt(val);
  state.custom[i].p = isNaN(p) ? 0 : p;
  document.getElementById(`csub_${i}`).textContent = fmtMoney(state.custom[i].q * state.custom[i].p);
  updateBudget();
}
function stepCustomQty(i, d) {
  let v = Math.max(0, state.custom[i].q + d);
  state.custom[i].q = v;
  document.getElementById(`cqinp_${i}`).value = v;
  document.getElementById(`csub_${i}`).textContent = fmtMoney(v * state.custom[i].p);
  updateBudget();
}
function inputCustomQty(i, val) {
  let n = parseInt(val);
  if (isNaN(n) || n < 0) n = 0;
  state.custom[i].q = n;
  document.getElementById(`cqinp_${i}`).value = n;
  document.getElementById(`csub_${i}`).textContent = fmtMoney(n * state.custom[i].p);
  updateBudget();
}

// ─── 重新計算總計與預算 ───
function calcTotal(){
  let regularTotal = CONFIG.items[state.proj].reduce((a,b,i)=>a+((state.qty[i]||0)*b.p),0);
  let customTotal = state.custom.reduce((a,c) => a + (c.q * c.p), 0);
  return regularTotal + customTotal;
}

function updateBudget(){
  let t=calcTotal(),lim=CONFIG.budget[state.proj],diff=lim-t,pct=Math.round(t/lim*100);
  document.getElementById('bbDiff').textContent=fmtMoney(Math.abs(diff));
  document.getElementById('bbLabel').textContent=diff>=0?'還差':'超出';
  document.getElementById('bbPct').textContent=pct+'%';
  let bar=document.getElementById('bbFill');bar.style.width=Math.min(pct,100)+'%';
  bar.style.background=diff>=0?'var(--primary-light)':'var(--danger)';
  document.getElementById('bbPct').style.color=diff>=0?'var(--primary)':'var(--danger)';
}

function renderResult(){
  let t=calcTotal(),lim=CONFIG.budget[state.proj],d=new Date();
  document.getElementById('rLoc').textContent=`${state.loc.t} ${state.loc.v}`;
  document.getElementById('rProj').textContent=state.proj===1?'01 防災':'02 低碳';
  document.getElementById('rDate').textContent=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
  let tb=document.getElementById('resultBody');tb.innerHTML='';
  
  let hasItem = false;
  CONFIG.items[state.proj].forEach((it,i)=>{
    if(state.qty[i]>0) {
      tb.innerHTML+=`<tr><td>${it.n}</td><td class="price-col">${fmtMoney(it.p)}</td><td style="text-align:center">${state.qty[i]}</td><td class="total-col">${fmtMoney(state.qty[i]*it.p)}</td></tr>`;
      hasItem = true;
    }
  });

  state.custom.forEach(cItem => {
    if(cItem.q > 0 && cItem.n.trim() !== '') {
      tb.innerHTML+=`<tr class="custom-row"><td>${cItem.n} (自訂)</td><td class="price-col">${fmtMoney(cItem.p)}</td><td style="text-align:center">${cItem.q}</td><td class="total-col">${fmtMoney(cItem.q*cItem.p)}</td></tr>`;
      hasItem = true;
    }
  });

  if(!hasItem) tb.innerHTML='<tr><td colspan="4" style="text-align:center;color:#999;padding:15px">無選購項目</td></tr>';
  
  document.getElementById('rTotal').textContent=fmtMoney(t);
  document.getElementById('rLimitInfo').textContent=`上限 ${fmtMoney(lim)}`;

  let diff = lim - t;
  let diffEl = document.getElementById('rDiffVal');
  let labelEl = document.getElementById('rDiffLabel');
  let rowEl = document.getElementById('rDiffRow');
  if(diff >= 0){
    labelEl.textContent = '預算剩餘';
    diffEl.textContent = fmtMoney(diff);
    rowEl.style.color = '#58d68d';
  } else {
    labelEl.textContent = '超出預算';
    diffEl.textContent = fmtMoney(Math.abs(diff));
    rowEl.style.color = '#ec7063';
  }
}

function markDone(){
  if(!state.loc)return;
  state.saved[state.loc.id]={proj:state.proj,qty:state.qty,chk:state.chk,custom:state.custom};
  saveToLocal();
  document.getElementById(`loc_${state.loc.id}`).classList.add('local-done');
  updateProgress();
  toast('已儲存至本機！');
}

// === 建立 CSV 內容 ===
function buildCSVContent(loc, proj, chk, qty, custom){
  let rows = [
    ['序號','鄉鎮','村里','現勘場域','盤點項目','項目','數量','價錢','總價']
  ];
  let rowNumber = 1;
  let grandTotal = 0;
  let projName = (proj === 1) ? '防災避難所' : '低碳永續家園';

  CONFIG.items[proj].forEach((it, i) => {
    if((qty[i] || 0) > 0){
      let q = qty[i] || 0;
      let subtotal = q * it.p;
      grandTotal += subtotal;
      rows.push([rowNumber, loc.t, loc.v, loc.s, projName, it.n, q, it.p, subtotal]);
      rowNumber++;
    }
  });

  if(custom && custom.length > 0) {
    custom.forEach(cItem => {
      if(cItem.q > 0 && cItem.n.trim() !== '') {
        let subtotal = cItem.q * cItem.p;
        grandTotal += subtotal;
        rows.push([rowNumber, loc.t, loc.v, loc.s, projName, cItem.n + ' (自訂)', cItem.q, cItem.p, subtotal]);
        rowNumber++;
      }
    });
  }

  rows.push([]);
  rows.push(['','','','','','合計','','',grandTotal]);

  return "\uFEFF" + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
}

function getCSVContent(){
  return buildCSVContent(state.loc, state.proj, state.chk, state.qty, state.custom);
}

function exportCSV(){
  let csv=getCSVContent();
  let b=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(b);
  a.download=`${state.loc.t}_${state.loc.v}_報價單.csv`;
  a.click();
}

function postToDrive(filename, csvContent){
  return fetch(GOOGLE_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ filename: filename, content: csvContent })
  }).then(res => res.text()).then(txt => {
    if(!txt) return {status:'success'};
    try { return JSON.parse(txt); } catch(e){ return {status:'success'}; }
  });
}

async function uploadAllToDrive(){
  let ids = Object.keys(state.saved || {});
  if(ids.length === 0){
    alert('目前沒有任何「本機暫存」資料可上傳。\n請先將各村里報價單按「儲存並完成」後再上傳。');
    return;
  }
  if(!confirm(`將上傳 ${ids.length} 筆村里資料到雲端（同名檔案會覆蓋）。\n確定要繼續嗎？`)) return;

  document.getElementById('loadingOverlay').style.display = 'flex';

  let ok = 0, fail = 0;
  for(let idx=0; idx<ids.length; idx++){
    let id = ids[idx];
    let loc = CONFIG.locs.find(x => String(x.id) === String(id));
    let s = state.saved[id];
    if(!loc || !s){ fail++; continue; }

    document.getElementById('loadingText').textContent = `正在上傳 (${idx+1}/${ids.length})：${loc.t} ${loc.v}`;

    let csv = buildCSVContent(loc, s.proj, s.chk || {}, s.qty || {}, s.custom || []);
    let filename = `${loc.t}_${loc.v}_報價單.csv`;

    try {
      let resp = await postToDrive(filename, csv);
      if(resp && resp.status === 'error') fail++; else ok++;
    } catch(e){
      console.error(e);
      fail++;
    }
  }

  document.getElementById('loadingOverlay').style.display = 'none';
  toast(`✅ 上傳完成：成功 ${ok} 筆、失敗 ${fail} 筆`);
  setTimeout(syncCloud, 1000);
}

function saveToLocal(){localStorage.setItem('calc_v2',JSON.stringify(state.saved));}
function loadFromLocal(){let d=localStorage.getItem('calc_v2');if(d)state.saved=JSON.parse(d);}
function updateProgress(){let d=Object.keys(state.saved).length,t=CONFIG.locs.length;document.getElementById('progText').textContent=`${d} / ${t}`;document.getElementById('progFill').style.width=(d/t*100)+'%';}
function resetAll(){if(confirm('確定重置所有本機暫存？(這不會刪除雲端檔案)')){localStorage.removeItem('calc_v2');location.reload();}}

function showSavedModal(){
  document.getElementById('savedListView').style.display = 'block';
  document.getElementById('savedDetailView').style.display = 'none';
  document.getElementById('modalTitle').textContent = '本機暫存清單';

  let tb=document.getElementById('modalListBody');tb.innerHTML='';
  let ids = Object.keys(state.saved);

  if(ids.length === 0){
    tb.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:#aaa">尚無本機資料</td></tr>';
  } else {
    ids.forEach(id=>{
      let l=CONFIG.locs.find(x=>x.id==id),s=state.saved[id],t=0;
      CONFIG.items[s.proj].forEach((it,i)=>{if(s.qty[i]>0)t+=(s.qty[i]||0)*it.p;});
      if(s.custom) s.custom.forEach(c => { t += (c.q * c.p); });
      tb.innerHTML+=`<tr>
        <td>${l.t} ${l.v}</td>
        <td style="font-weight:bold">${fmtMoney(t)}</td>
        <td>
          <button class="btn-sm btn-outline" onclick="viewSavedDetail(${id})">詳情</button>
          <button class="btn-sm btn-edit" onclick="editSaved(${id})">✏️ 載入</button>
          <button class="btn-sm btn-danger" onclick="deleteSaved(${id})">🗑</button>
        </td>
      </tr>`;
    });
  }
  document.getElementById('savedModal').style.display='flex';
}
function closeModal(){document.getElementById('savedModal').style.display='none';}

function viewSavedDetail(id){
  let l = CONFIG.locs.find(x=>x.id==id);
  let s = state.saved[id];
  let items = CONFIG.items[s.proj];
  let grandTotal = 0;

  document.getElementById('savedListView').style.display = 'none';
  document.getElementById('savedDetailView').style.display = 'block';
  document.getElementById('modalTitle').textContent = '明細詳情';
  document.getElementById('detailTitle').textContent = `${l.t} ${l.v}`;

  let tbody = document.getElementById('detailTableBody');
  tbody.innerHTML = '';

  let hasItem = false;
  items.forEach((it, i) => {
    if(s.qty[i] > 0){
      hasItem = true;
      let sub = s.qty[i] * it.p;
      grandTotal += sub;
      tbody.innerHTML += `<tr>
        <td>${it.n}</td>
        <td>${fmtMoney(it.p)}</td>
        <td style="text-align:center">${s.qty[i]}</td>
        <td style="text-align:right;font-weight:bold">${fmtMoney(sub)}</td>
      </tr>`;
    }
  });
  
  if(s.custom) {
    s.custom.forEach(cItem => {
      if(cItem.q > 0 && cItem.n.trim() !== '') {
        hasItem = true;
        let sub = cItem.q * cItem.p;
        grandTotal += sub;
        tbody.innerHTML += `<tr class="custom-row">
          <td>${cItem.n} (自訂)</td>
          <td>${fmtMoney(cItem.p)}</td>
          <td style="text-align:center">${cItem.q}</td>
          <td style="text-align:right;font-weight:bold">${fmtMoney(sub)}</td>
        </tr>`;
      }
    });
  }

  if(!hasItem) tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#aaa">無項目</td></tr>';
  document.getElementById('detailTotal').textContent = `總計：${fmtMoney(grandTotal)}`;
}

function editSaved(id){closeModal();selectLoc(CONFIG.locs.find(x=>x.id==id));goPage(0);}
function deleteSaved(id){
  if(!confirm('確定要刪除此筆本機暫存？')) return;
  delete state.saved[id];
  saveToLocal();
  let btn = document.getElementById(`loc_${id}`);
  if(btn) btn.classList.remove('local-done');
  updateProgress();
  showSavedModal();
  toast('已刪除');
}
</script>
</body>
</html>
